<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>KAZOTH // OFFICIAL TERMINAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="void-engine">
        <div class="data-rain"></div>
        <div class="kinetic-grid"></div>
        <div class="vignette-mask"></div>
    </div>

    <main class="core-mainframe">
        
        <header class="hero-monolith">
            <div class="hologram-projector">
                <img src="kAzOth.vNm.png" alt="KAZOTH" class="holo-layer base">
                <div class="glitch-overlay"></div>
            </div>
            
            <div class="genre-indicator">
                <span class="status-led neon-cyan">HARDCORE</span>
                <span class="status-led neon-red">DARKCORE</span>
                <span class="status-led neon-cyan">DOOMCORE</span>
                <span class="status-led neon-red">INDUSTRIAL</span>
                <span class="status-led neon-cyan">TECHNO</span>
            </div>
        </header>

        <section class="hardware-module player-section">
            <div class="module-branding">AUDIO_OUTPUT_CHANNEL_01</div>
            <div class="frame-scanner">
                <iframe width="100%" height="400" src="https://hearthis.at/kazoth/embed/?hcolor=00f2ff&skin=black&playlist=1" frameborder="0"></iframe>
            </div>
        </section>

        <section class="hardware-module video-section">
            <div class="module-branding">VISUAL_FEED_CHANNEL_02</div>
            <div class="video-chassis">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=PLYFvpPGIc3kxEhqPzqQI0R8DOSDgMnRrd" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <section class="hardware-module social-links">
            <div class="module-branding">NEURAL_NETWORK_LINKS</div>
            <nav class="cyber-grid">
                <a href="https://linktw.in/bQEHiM" class="cyber-node youtube">
                    <span class="bracket-l"></span><i class="fab fa-youtube"></i><span class="label">YOUTUBE</span><span class="bracket-r"></span>
                </a>
                <a href="https://www.facebook.com/kAzOth.aka.Psykomars" class="cyber-node facebook">
                    <span class="bracket-l"></span><i class="fab fa-facebook-f"></i><span class="label">FACEBOOK</span><span class="bracket-r"></span>
                </a>
                <a href="https://audio.com/kazoth" class="cyber-node music">
                    <span class="bracket-l"></span><i class="fas fa-music"></i><span class="label">AUDIO.COM</span><span class="bracket-r"></span>
                </a>
                <a href="https://hearthis.at/kazoth" class="cyber-node headphones">
                    <span class="bracket-l"></span><i class="fas fa-headphones"></i><span class="label">HEARTHIS</span><span class="bracket-r"></span>
                </a>
                <a href="https://www.mixcloud.com/Psykomars" class="cyber-node mixcloud">
                    <span class="bracket-l"></span><i class="fab fa-mixcloud"></i><span class="label">MIXCLOUD</span><span class="bracket-r"></span>
                </a>
                <a href="https://soundcloud.com/the_kazoth" class="cyber-node soundcloud">
                    <span class="bracket-l"></span><i class="fab fa-soundcloud"></i><span class="label">SOUNDCLOUD</span><span class="bracket-r"></span>
                </a>
                <a href="https://kazoth.bandcamp.com" class="cyber-node bandcamp">
                    <span class="bracket-l"></span><i class="fab fa-bandcamp"></i><span class="label">BANDCAMP</span><span class="bracket-r"></span>
                </a>
                <a href="https://www.tiktok.com/@the.kazoth" class="cyber-node tiktok">
                    <span class="bracket-l"></span><i class="fab fa-tiktok"></i><span class="label">TIKTOK</span><span class="bracket-r"></span>
                </a>
                <a href="https://www.instagram.com/the_kazoth" class="cyber-node instagram">
                    <span class="bracket-l"></span><i class="fab fa-instagram"></i><span class="label">INSTAGRAM</span><span class="bracket-r"></span>
                </a>
            </nav>
        </section>

        <footer class="hardware-module booking-section">
            <a href="mailto:the.kAzOth@gmail.com" class="override-button">
                <span class="prime-data">THE.KAZOTH@GMAIL.COM</span>
                <span class="sub-data">INITIATE BOOKING PROTOCOL</span>
            </a>
        </footer>
    </main>
</body>
</html>
