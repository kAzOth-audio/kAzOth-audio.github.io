<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZOTH | Transmission Core</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanline-effect"></div>

    <main class="terminal-container">
        <header class="sys-header">
            <div class="status-bar">
                <span class="status-indicator">● LIVE</span>
                <span class="sys-id">ZONE-01 // FREQ: ERROR909</span>
            </div>
            
            <div class="logo-container">
                <img src="kAzOth.vNm.png" alt="KAZOTH Logo" class="brand-image">
            </div>
            
            <h2 class="sub-classification">HARDCORE / DARKCORE / DOOMCORE / INDUSTRIAL / TECHNO</h2>
        </header>

        <section class="sys-module audio-module">
            <h3 class="module-title">>> LATEST_TRANSMISSION</h3>
            <div class="hardware-wrapper">
                <iframe 
                    width="100%" height="200" 
                    src="https://hearthis.at/kazoth/embed/?hcolor=00f2ff&skin=black" 
                    frameborder="0" 
                    allowtransparency="true"
                    title="KAZOTH Audio Player">
                </iframe>
            </div>
        </section>

        <section class="sys-module network-module">
            <h3 class="module-title">>> NEURAL_NETWORK</h3>
            
            <div class="network-grid">
                <a href="https://soundcloud.com/the_kazoth" target="_blank" class="net-node primary">
                    <i class="fab fa-soundcloud"></i>
                    <span>SOUNDCLOUD</span>
                </a>
                <a href="https://kazoth.bandcamp.com" target="_blank" class="net-node primary">
                    <i class="fab fa-bandcamp"></i>
                    <span>BANDCAMP</span>
                </a>
                <a href="https://www.instagram.com/the_kazoth" target="_blank" class="net-node primary">
                    <i class="fab fa-instagram"></i>
                    <span>INSTAGRAM</span>
                </a>
                <a href="https://linktw.in/bQEHiM" target="_blank" class="net-node primary">
                    <i class="fab fa-youtube"></i>
                    <span>YOUTUBE</span>
                </a>

                <a href="https://hearthis.at/kazoth" target="_blank" class="net-node secondary">
                    <i class="fas fa-headphones"></i> HEARTHIS
                </a>
                <a href="https://audio.com/kazoth" target="_blank" class="net-node secondary">
                    <i class="fas fa-music"></i> AUDIO.COM
                </a>
                <a href="https://www.mixcloud.com/Psykomars" target="_blank" class="net-node secondary">
                    <i class="fab fa-mixcloud"></i> MIXCLOUD
                </a>
                <a href="https://www.tiktok.com/@the.kazoth" target="_blank" class="net-node secondary">
                    <i class="fab fa-tiktok"></i> TIKTOK
                </a>
                <a href="https://www.facebook.com/kAzOth.aka.Psykomars" target="_blank" class="net-node secondary">
                    <i class="fab fa-facebook"></i> FACEBOOK
                </a>
            </div>
        </section>

        <footer class="sys-module booking-module">
            <a href="mailto:the.kAzOth@gmail.com" class="booking-action">
                <span class="btn-data">[ INITIATE CONTACT ]</span>
                <span class="btn-text">the.kAzOth@gmail.com</span>
            </a>
        </footer>
    </main>
</body>
</html>
