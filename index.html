<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>KAZOTH // OFFICIAL</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="void-engine">
        <div class="data-rain"></div>
        <div class="kinetic-grid"></div>
        <div class="vignette-mask"></div>
    </div>

    <main class="core-mainframe">
        
        <header class="hero-monolith">
            <div class="hologram-projector">
                <img src="kAzOth.vNm.png" alt="KAZOTH" class="holo-layer base">
                <img src="kAzOth.vNm.png" alt="" class="holo-layer red-shift" aria-hidden="true">
                <img src="kAzOth.vNm.png" alt="" class="holo-layer cyan-shift" aria-hidden="true">
                <div class="projector-beam"></div>
            </div>
            
            <div class="classification-bar">
                <div class="blade-line"></div>
                <h2 class="genre-matrix">
                    <span>HARDCORE</span><span class="sep">/</span>
                    <span>DARKCORE</span><span class="sep">/</span>
                    <span>DOOMCORE</span><span class="sep">/</span>
                    <span>INDUSTRIAL</span><span class="sep">/</span>
                    <span>TECHNO</span>
                </h2>
                <div class="blade-line"></div>
            </div>
        </header>

        <section class="hardware-module">
            <div class="module-header">
                <span class="cyber-tag">SYS.01</span>
                <span class="module-title">AUDIO_CORE_TRANSMISSION</span>
            </div>
            <div class="chassis">
                <iframe width="100%" height="400" src="https://hearthis.at/kazoth/embed/?hcolor=00f2ff&skin=black&playlist=1" frameborder="0" allowtransparency="true"></iframe>
                <div class="chassis-glass"></div>
            </div>
        </section>

        <section class="hardware-module">
            <div class="module-header">
                <span class="cyber-tag">SYS.02</span>
                <span class="module-title">OPTICAL_DATA_FEED</span>
            </div>
            <div class="chassis crt-monitor">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=PLbpi6Zaht2b3b7V-Lio6D0eH_fD1yK94z" title="KAZOTH YOUTUBE VAULT" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="crt-overlay"></div>
            </div>
        </section>

        <section class="hardware-module">
            <div class="module-header">
                <span class="cyber-tag">SYS.03</span>
                <span class="module-title">NEURAL_INTERFACE_LINKS</span>
            </div>
            <nav class="matrix-grid">
                <a href="https://linktw.in/bQEHiM" target="_blank" class="cyber-node youtube">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-youtube"></i><span class="node-label">YOUTUBE</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://www.facebook.com/kAzOth.aka.Psykomars" target="_blank" class="cyber-node facebook">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-facebook-f"></i><span class="node-label">FACEBOOK</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://audio.com/kazoth" target="_blank" class="cyber-node audiocom">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fas fa-music"></i><span class="node-label">AUDIO.COM</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://hearthis.at/kazoth" target="_blank" class="cyber-node hearthis">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fas fa-headphones"></i><span class="node-label">HEARTHIS</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://www.mixcloud.com/Psykomars" target="_blank" class="cyber-node mixcloud">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-mixcloud"></i><span class="node-label">MIXCLOUD</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://soundcloud.com/the_kazoth" target="_blank" class="cyber-node soundcloud">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-soundcloud"></i><span class="node-label">SOUNDCLOUD</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://kazoth.bandcamp.com" target="_blank" class="cyber-node bandcamp">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-bandcamp"></i><span class="node-label">BANDCAMP</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://www.tiktok.com/@the.kazoth" target="_blank" class="cyber-node tiktok">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-tiktok"></i><span class="node-label">TIKTOK</span></div><span class="target-bracket right"></span>
                </a>
                <a href="https://www.instagram.com/the_kazoth" target="_blank" class="cyber-node instagram">
                    <span class="target-bracket left"></span><div class="node-content"><i class="fab fa-instagram"></i><span class="node-label">INSTAGRAM</span></div><span class="target-bracket right"></span>
                </a>
            </nav>
        </section>

        <footer class="hardware-module booking-section">
            <a href="mailto:the.kAzOth@gmail.com" class="override-button">
                <div class="btn-scanline"></div>
                <div class="btn-content">
                    <span class="prime-data">THE.KAZOTH@GMAIL.COM</span>
                    <span class="sub-data">INITIATE BOOKING PROTOCOL</span>
                </div>
            </a>
            <div class="system-footprint">KAZOTH // SECURE_CORE_V9 // © 2026</div>
        </footer>
    </main>
</body>
</html>
