<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZOTH // INDUSTRIAL COMMAND</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-engine">
        <div class="grid-layer"></div>
        <div class="scanline"></div>
        <div class="vignette"></div>
    </div>

    <div class="ui-wrapper">
        <header class="main-header">
            <div class="status-bar">
                <span class="status-node">SYSTEM: ACTIVE</span>
                <span class="status-node">LOC: FR_UNDERGROUND</span>
                <span class="status-node clock">2026_V1</span>
            </div>

            <div class="branding-core">
                <div class="logo-container">
                    <img src="kAzOth.vNm.png" alt="KAZOTH" class="logo-main">
                    <div class="logo-glitch-layer red"></div>
                    <div class="logo-glitch-layer cyan"></div>
                </div>
                
                <div class="genre-cluster">
                    <span class="genre-item pulse-1">HARDCORE</span>
                    <span class="genre-item pulse-2">DARKCORE</span>
                    <span class="genre-item pulse-3">DOOMCORE</span>
                    <span class="genre-item pulse-1">INDUSTRIAL</span>
                    <span class="genre-item pulse-2">TECHNO</span>
                </div>
            </div>
        </header>

        <main class="content-grid">
            <section class="module audio-module">
                <div class="module-tag">TRANSMISSION_01</div>
                <div class="frame-container">
                    <div class="frame-corner tl"></div>
                    <div class="frame-corner br"></div>
                    <iframe width="100%" height="400" src="https://hearthis.at/kazoth/embed/?hcolor=00f2ff&skin=black&playlist=1" frameborder="0"></iframe>
                </div>
            </section>

            <section class="module video-module">
                <div class="module-tag">VISUAL_FEED_02</div>
                <div class="crt-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=PLYFvpPGIc3kxEhqPzqQI0R8DOSDgMnRrd" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>

            <section class="module link-module">
                <div class="module-tag">NEURAL_LINKS_03</div>
                <nav class="links-grid">
                    <a href="https://soundcloud.com/the_kazoth" target="_blank" class="node">
                        <i class="fab fa-soundcloud"></i><span>SOUNDCLOUD</span>
                    </a>
                    <a href="https://kazoth.bandcamp.com" target="_blank" class="node">
                        <i class="fab fa-bandcamp"></i><span>BANDCAMP</span>
                    </a>
                    <a href="https://www.instagram.com/the_kazoth" target="_blank" class="node">
                        <i class="fab fa-instagram"></i><span>INSTAGRAM</span>
                    </a>
                    <a href="https://www.mixcloud.com/Psykomars" target="_blank" class="node">
                        <i class="fab fa-mixcloud"></i><span>MIXCLOUD</span>
                    </a>
                </nav>
            </section>
        </main>

        <footer class="main-footer">
            <a href="mailto:the.kAzOth@gmail.com" class="booking-cta">
                <span class="cta-label">INITIATE_BOOKING</span>
                <span class="cta-email">THE.KAZOTH@GMAIL.COM</span>
            </a>
        </footer>
    </div>

</body>
</html>
